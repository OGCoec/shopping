<h2 class="password-step-title">找回密码</h2>

<div class="form-group">
  <label for="reset-identifier">邮箱或手机号</label>
  <div class="input-wrapper">
    <input type="text" id="reset-identifier" placeholder="请输入邮箱或手机号" autocomplete="off" />
  </div>
</div>

<div class="form-group">
  <label for="reset-code">验证码</label>
  <div class="input-wrapper">
    <input type="text" id="reset-code" placeholder="请输入验证码" inputmode="numeric" autocomplete="one-time-code" />
  </div>
</div>

<div class="form-group">
  <label for="reset-password">新密码</label>
  <div class="input-wrapper">
    <input type="password" id="reset-password" placeholder="请输入新密码" autocomplete="new-password" />
  </div>
</div>

<div class="form-group">
  <label for="reset-confirm">确认新密码</label>
  <div class="input-wrapper">
    <input type="password" id="reset-confirm" placeholder="请再次输入新密码" autocomplete="new-password" />
  </div>
</div>

<div class="error-msg" id="reset-error-msg"></div>

<button type="button" class="btn-login" id="btn-reset-submit">
  <span class="btn-text">重置密码</span>
  <div class="btn-hover-content">
    <span>重置密码</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12" />
      <polyline points="12 5 19 12 12 19" />
    </svg>
  </div>
</button>

<div class="signup-link">
  想起密码了？ <a href="/shopping/user/login" data-spa-route>返回登录</a>
</div>
