<h2 class="password-step-title">创建账号</h2>

<div class="form-group">
  <label for="register-entry-email">电子邮箱</label>
  <div class="input-wrapper">
    <input type="email" id="register-entry-email" placeholder="you@example.com" autocomplete="email" />
  </div>
</div>

<div class="error-msg" id="register-entry-error-msg"></div>

<button type="button" class="btn-login" id="btn-register-email-continue">
  <span class="btn-text">继续</span>
  <div class="btn-hover-content">
    <span>继续</span>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="5" y1="12" x2="19" y2="12" />
      <polyline points="12 5 19 12 12 19" />
    </svg>
  </div>
</button>

<div class="signup-link">
  已有账号？<a href="/shopping/user/log-in" data-spa-route>去登录</a>
</div>
