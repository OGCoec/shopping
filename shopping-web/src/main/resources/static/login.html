<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>欢迎登录 - Shopping System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons/css/flag-icons.min.css" />
  <link rel="stylesheet" href="/css/login.css" />
</head>

<body>
  <!-- Background Particles -->
  <canvas id="canvas-container"></canvas>

  <!-- Login Page -->
  <div id="login-page">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M12 2L15 9H9L12 2Z" />
          <path d="M12 22L9 15H15L12 22Z" />
          <path d="M2 12L9 9V15L2 12Z" />
          <path d="M22 12L15 15V9L22 12Z" />
        </svg>
        <span>ShoppingSystem</span>
      </div>
      <div class="characters-wrapper">
        <div class="characters-scene" id="characters-scene">
          <!-- Purple character -->
          <div class="character char-purple" id="char-purple">
            <div class="eyes" id="purple-eyes" style="left: 45px; top: 40px; gap: 28px">
              <div class="eyeball" id="purple-eye-l" style="width: 18px; height: 18px">
                <div class="pupil" id="purple-pupil-l" style="width: 7px; height: 7px"></div>
              </div>
              <div class="eyeball" id="purple-eye-r" style="width: 18px; height: 18px">
                <div class="pupil" id="purple-pupil-r" style="width: 7px; height: 7px"></div>
              </div>
            </div>
          </div>
          <!-- Black character -->
          <div class="character char-black" id="char-black">
            <div class="eyes" id="black-eyes" style="left: 26px; top: 32px; gap: 20px">
              <div class="eyeball" id="black-eye-l" style="width: 16px; height: 16px">
                <div class="pupil" id="black-pupil-l" style="width: 6px; height: 6px"></div>
              </div>
              <div class="eyeball" id="black-eye-r" style="width: 16px; height: 16px">
                <div class="pupil" id="black-pupil-r" style="width: 6px; height: 6px"></div>
              </div>
            </div>
          </div>
          <!-- Orange character -->
          <div class="character char-orange" id="char-orange">
            <div class="eyes" id="orange-eyes" style="left: 82px; top: 90px; gap: 28px">
              <div class="bare-pupil" id="orange-pupil-l"></div>
              <div class="bare-pupil" id="orange-pupil-r"></div>
            </div>
            <div class="orange-mouth" id="orange-mouth" style="left: 90px; top: 120px"></div>
          </div>
          <!-- Yellow character -->
          <div class="character char-yellow" id="char-yellow">
            <div class="eyes" id="yellow-eyes" style="left: 52px; top: 40px; gap: 20px">
              <div class="bare-pupil" id="yellow-pupil-l"></div>
              <div class="bare-pupil" id="yellow-pupil-r"></div>
            </div>
            <div class="yellow-mouth" id="yellow-mouth" style="left: 40px; top: 88px"></div>
          </div>
        </div>
      </div>
      <div class="footer-links">
        <a href="#">隐私政策</a>
        <a href="#">服务条款</a>
        <a href="#">联系我们</a>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="form-container">
        <div class="sparkle-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L13.5 9H10.5L12 2Z" fill="#1a1a2e" />
            <path d="M12 22L10.5 15H13.5L12 22Z" fill="#1a1a2e" />
            <path d="M2 12L9 10.5V13.5L2 12Z" fill="#1a1a2e" />
            <path d="M22 12L15 13.5V10.5L22 12Z" fill="#1a1a2e" />
          </svg>
        </div>
        <div class="form-header">
          <h1 id="pretext-title"></h1>
          <p id="pretext-subtitle"></p>
        </div>

        <form id="login-form" onsubmit="return false;">
          <div id="email-login-view" class="login-view is-active">
            <div class="form-group">
              <label id="email-label" for="email">电子邮箱</label>
              <div class="input-wrapper">
                <input type="email" id="email" placeholder="you@example.com" autocomplete="off" />
              </div>
            </div>

            <div class="form-options">
              <label class="remember-me" for="remember-login">
                <input type="checkbox" id="remember-login" name="remember-login" />
                <span>记住登录状态（30天）</span>
              </label>
              <a href="/shopping/user/forgot-password" class="forgot-link" id="forgot-password-link" data-spa-route>忘记密码？</a>
            </div>

            <div class="error-msg" id="error-msg"></div>

            <button type="submit" class="btn-login" id="btn-login">
              <span class="btn-text">继续</span>
              <div class="btn-hover-content">
                <span>继续</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>

            <button type="button" class="btn-google" id="btn-google">
              <span class="btn-text">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                    fill="#4285F4" />
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853" />
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A11.96 11.96 0 001 12c0 1.94.46 3.77 1.18 5.07l3.66-2.84v-.14z"
                    fill="#FBBC05" />
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335" />
                </svg>
                使用 Google 登录
              </span>
              <div class="btn-hover-content">
                <span>使用 Google 登录</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>

            <button type="button" class="btn-google btn-github" id="btn-github">
              <span class="btn-text">
                <svg class="google-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M12 2C6.48 2 2 6.58 2 12.22c0 4.51 2.87 8.33 6.84 9.68.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.89-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.49-1.11-1.49-.91-.64.07-.63.07-.63 1 .07 1.53 1.05 1.53 1.05.9 1.57 2.36 1.12 2.93.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05A9.32 9.32 0 0112 6.87c.85 0 1.71.12 2.51.36 1.91-1.32 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.06.36.32.68.95.68 1.92 0 1.38-.01 2.49-.01 2.83 0 .27.18.59.69.49A10.24 10.24 0 0022 12.22C22 6.58 17.52 2 12 2z" />
                </svg>
                使用 GitHub 登录
              </span>
              <div class="btn-hover-content">
                <span>使用 GitHub 登录</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>

            <button type="button" class="btn-google btn-microsoft" id="btn-microsoft">
              <span class="btn-text">
                <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <rect x="2" y="2" width="9" height="9" fill="#f25022" />
                  <rect x="13" y="2" width="9" height="9" fill="#7fba00" />
                  <rect x="2" y="13" width="9" height="9" fill="#00a4ef" />
                  <rect x="13" y="13" width="9" height="9" fill="#ffb900" />
                </svg>
                使用 Microsoft 登录
              </span>
              <div class="btn-hover-content">
                <span>使用 Microsoft 登录</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>

            <button type="button" class="btn-google btn-phone" id="btn-phone">
              <span class="btn-text">
                <svg class="google-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.8 19.8 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.62 2.63a2 2 0 0 1-.45 2.11L8 9.71a16 16 0 0 0 6.29 6.29l1.25-1.25a2 2 0 0 1 2.11-.45c.85.29 1.73.5 2.63.62A2 2 0 0 1 22 16.92z" />
                </svg>
                使用手机号登录
              </span>
              <div class="btn-hover-content">
                <span>使用手机号登录</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>
          </div>

          <div id="phone-login-view" class="login-view is-hidden">
            <div class="phone-header">使用手机号登录</div>
            <div class="phone-subtitle">输入手机号以继续</div>

            <div class="form-group phone-field-group">
              <label for="phone-country-trigger">国家/地区</label>
              <div id="phone-country-picker" class="phone-country-picker" data-open="false">
                <input type="hidden" id="phone-country-code" name="phone-country-code" value="" />
                <button type="button" id="phone-country-trigger" class="phone-country-trigger" aria-haspopup="listbox"
                  aria-expanded="false" aria-controls="phone-country-popover">
                  <span class="phone-country-trigger-main">
                    <span id="phone-country-flag" class="fi"></span>
                    <span id="phone-country-name">Detecting...</span>
                  </span>
                  <span id="phone-country-code-label" class="phone-country-code-label">--</span>
                  <svg class="phone-country-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </button>
                <div id="phone-country-popover" class="phone-country-popover" role="dialog" aria-label="选择国家区号" hidden>
                  <div class="phone-country-search-wrap">
                    <input id="phone-country-search" type="text" class="phone-country-search" placeholder="搜索国家或区号"
                      autocomplete="off" />
                  </div>
                  <ul id="phone-country-list" class="phone-country-list" role="listbox" aria-label="国家区号列表"></ul>
                </div>
              </div>
            </div>

            <div class="form-group phone-field-group">
              <label id="phone-number-label" for="phone-number">手机号码</label>
              <input type="tel" id="phone-number" class="phone-pill-field" placeholder="手机号码" autocomplete="tel" />
            </div>

            <div class="error-msg" id="phone-error-msg"></div>

            <button type="submit" class="btn-login" id="btn-phone-continue">
              <span class="btn-text">继续</span>
              <div class="btn-hover-content">
                <span>继续</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>

            <a href="#" id="switch-to-email" class="switch-link">改用邮箱登录</a>
          </div>

          <div id="password-login-view" class="login-view is-hidden">
            <h2 class="password-step-title">输入密码</h2>

            <div class="password-identifier-wrap">
              <div class="password-identifier-label" id="identifier-label">电子邮件地址</div>
              <div class="password-identifier-box">
                <span id="identifier-value"></span>
                <button type="button" id="edit-identifier-btn" class="edit-identifier-btn">编辑</button>
              </div>
            </div>

            <div class="password-input-wrap">
              <input type="password" id="password-input" class="password-pill-input" placeholder="密码"
                autocomplete="current-password" />
              <button type="button" id="toggle-password-visibility" class="password-visibility-btn"
                aria-label="显示或隐藏密码">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>

            <a href="/shopping/user/forgot-password" class="password-forgot-link" data-spa-route>忘记了密码？</a>

            <div class="error-msg" id="password-error-msg"></div>

            <button type="submit" class="btn-login" id="btn-password-continue">
              <span class="btn-text">继续</span>
              <div class="btn-hover-content">
                <span>继续</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>

            <div class="password-alt-divider" aria-hidden="true">
              <span></span>
              <em>或</em>
              <span></span>
            </div>

            <button type="button" id="otp-login-btn" class="otp-login-btn">使用一次性验证码登录</button>
          </div>

          <div id="otp-login-view" class="login-view is-hidden">
            <h2 class="otp-step-title">检查您的收件箱</h2>

            <p class="otp-step-subtitle" id="otp-step-subtitle">输入我们刚刚向您的邮箱发送的验证码</p>

            <div class="form-group otp-field-group">
              <label id="otp-code-label" for="otp-code-input">验证码</label>
              <input type="text" id="otp-code-input" class="otp-code-input" placeholder="请输入验证码" inputmode="numeric"
                autocomplete="one-time-code" />
            </div>

            <div class="error-msg" id="otp-error-msg"></div>

            <button type="submit" class="btn-login" id="btn-otp-continue">
              <span class="btn-text">继续</span>
              <div class="btn-hover-content">
                <span>继续</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>

            <button type="button" id="otp-resend-btn" class="otp-resend-btn">重新发送验证码</button>

            <div class="password-alt-divider" aria-hidden="true">
              <span></span>
              <em>或</em>
              <span></span>
            </div>

            <button type="button" id="back-to-password-btn" class="otp-secondary-btn">使用密码继续</button>
          </div>

          <div id="register-phone-required-view" class="login-view is-hidden">
            <h2 class="register-phone-required-title">电话号码是必填项</h2>
            <p class="register-phone-required-subtitle">
              请继续添加手机号。我们会发送一次验证码用于完成验证。
            </p>

            <div class="form-group phone-field-group">
              <label for="register-phone-country-trigger">国家/地区</label>
              <div id="register-phone-country-picker" class="phone-country-picker register-phone-country-picker" data-open="false">
                <input type="hidden" id="register-phone-country-code" name="register-phone-country-code" value="" />
                <button type="button" id="register-phone-country-trigger" class="phone-country-trigger" aria-haspopup="listbox"
                  aria-expanded="false" aria-controls="register-phone-country-popover">
                  <span class="phone-country-trigger-main">
                    <span id="register-phone-country-flag" class="fi"></span>
                    <span id="register-phone-country-name">Detecting...</span>
                  </span>
                  <span id="register-phone-country-code-label" class="phone-country-code-label">--</span>
                  <svg class="phone-country-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    aria-hidden="true">
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </button>
                <div id="register-phone-country-popover" class="phone-country-popover" role="dialog" aria-label="选择国家区号" hidden>
                  <div class="phone-country-search-wrap">
                    <input id="register-phone-country-search" type="text" class="phone-country-search" placeholder="搜索国家或区号"
                      autocomplete="off" />
                  </div>
                  <ul id="register-phone-country-list" class="phone-country-list" role="listbox" aria-label="国家区号列表"></ul>
                </div>
              </div>
            </div>

            <div class="form-group phone-field-group">
              <label id="register-phone-required-label" for="register-phone-required-input">电话号码</label>
              <input type="tel" id="register-phone-required-input" class="phone-pill-field" placeholder="电话号码" autocomplete="tel" />
            </div>

            <div class="error-msg" id="register-phone-required-error-msg"></div>

            <button type="submit" class="btn-login" id="btn-register-phone-required-continue">
              <span class="btn-text">继续</span>
              <div class="btn-hover-content">
                <span>继续</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </div>
            </button>
          </div>

          <div id="register-view" class="login-view is-hidden" aria-live="polite"></div>

          <div id="forgot-password-view" class="login-view is-hidden" aria-live="polite"></div>
        </form>

        <div class="signup-link" id="signup-link-wrap">
          还没有账号？ <a href="/shopping/user/register" data-spa-route>立即注册</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/user/auth/login/login-visuals.js"></script>
  <script src="/js/user/auth/login/login-country-picker.js"></script>
  <script src="/js/user/auth/login/login-shell.js"></script>
  <script src="/js/user/auth/login/login-otp.js"></script>
  <script src="/js/user/auth/shared/auth-utils.js"></script>
  <script src="/js/user/auth/shared/preauth-client.js"></script>
  <script src="/js/user/auth/register/register-turnstile.js"></script>
  <script src="/js/user/auth/register/register-hcaptcha.js"></script>
  <script src="/js/user/auth/register/register-hutool-captcha.js"></script>
  <script src="/js/user/auth/register/tianai/register-tianai-track.js"></script>
  <script src="/js/user/auth/register/register-form.js"></script>
  <script src="/js/user/auth/register/tianai/register-tianai.js"></script>
  <script src="/js/user/login.js"></script>
  <script src="/js/user/register.js"></script>
</body>

</html>
