<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员初始化 - Shopping System</title>
  <link rel="icon" href="/favicon.ico" />
  <script>
    (function () {
      var key = "shopping:admin:parti-morph:pending:v1";
      try {
        if (sessionStorage.getItem(key) === "1") {
          document.documentElement.classList.add("admin-morph-pending");
          window.setTimeout(function () {
            document.documentElement.classList.remove("admin-morph-pending");
            try {
              sessionStorage.removeItem(key);
            } catch (_) {
            }
          }, 6000);
        }
      } catch (_) {
      }
    })();
  </script>
  <link rel="modulepreload" href="/error/three.module.min.js" />
  <link rel="modulepreload" href="/error/three.core.min.js" />
  <link rel="stylesheet" href="/fonts/noto-sans-sc/noto-sans-sc.css" />
  <link rel="stylesheet" href="/css/admin-auth.css?v=4" />
  <script defer src="/js/admin/admin-api.js"></script>
  <script defer src="/js/vendor/html2canvas.min.js"></script>
  <script defer src="/js/admin/admin-particle-transition.js?v=9"></script>
  <script defer src="/js/admin/admin-firstlogin.js?v=2"></script>
</head>
<body>
  <main class="admin-auth-shell">
    <section class="admin-auth-panel">
      <form id="admin-firstlogin-form" class="admin-auth-card" data-admin-source data-admin-target>
        <div class="admin-auth-mark" aria-hidden="true"></div>
        <header class="admin-auth-header">
          <p>Shopping System</p>
          <h1>首次管理员初始化</h1>
        </header>

        <label class="admin-field">
          <span>用户名</span>
          <input id="admin-firstlogin-username" type="text" autocomplete="username" maxlength="64" required />
        </label>

        <label class="admin-field">
          <span>手机号</span>
          <input id="admin-firstlogin-phone" type="tel" autocomplete="tel" inputmode="tel" maxlength="20" required />
        </label>

        <label class="admin-field">
          <span>邮箱</span>
          <input id="admin-firstlogin-email" type="email" autocomplete="email" required />
        </label>

        <div class="admin-code-row">
          <label class="admin-field">
            <span>邮箱验证码</span>
            <input id="admin-firstlogin-code" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" autocomplete="one-time-code" required />
          </label>
          <button id="admin-firstlogin-send-code" class="admin-secondary-button" type="button">获取验证码</button>
        </div>

        <label class="admin-field">
          <span>密码</span>
          <input id="admin-firstlogin-password" type="password" autocomplete="new-password" minlength="8" maxlength="128" required />
        </label>

        <label class="admin-field">
          <span>确认密码</span>
          <input id="admin-firstlogin-confirm" type="password" autocomplete="new-password" minlength="8" maxlength="128" required />
        </label>

        <p id="admin-firstlogin-status" class="admin-status" role="status" aria-live="polite"></p>

        <button id="admin-firstlogin-submit" class="admin-primary-button" type="submit">完成初始化</button>
      </form>
    </section>
  </main>

</body>
</html>
